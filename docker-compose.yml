# Usage (first time):
#   docker compose up -d db
#   docker compose run --rm app python run.py init-db
#   docker compose run --rm app python run.py ingest   # or nohup-style: see README
#   docker compose up -d app
#
# App listens on 0.0.0.0:8501 → http://localhost:8501

services:
  db:
    restart: unless-stopped
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      # 与项目根目录 .env 中 DB_PASSWORD 一致（compose 自动读取 .env）
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: space_debris
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./scripts/ensure_db.sh:/docker-entrypoint-initdb.d/ensure_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d space_debris || (PGPASSWORD=$$POSTGRES_PASSWORD psql -U postgres -c \"SELECT 1 FROM pg_database WHERE datname='space_debris'\" | grep -q 1 || PGPASSWORD=$$POSTGRES_PASSWORD psql -U postgres -c \"CREATE DATABASE space_debris;\") && pg_isready -U postgres -d space_debris"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 15s

  app:
    restart: unless-stopped
    build: .
    env_file:
      - .env
    environment:
      # 覆盖 .env 里面向「本机直连」的 DB_*，与上方 db 服务保持一致（避免密码/库名不一致）
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: space_debris
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      # 显式绑定所有网卡，便于局域网/公网访问（勿写 127.0.0.1）
      - "0.0.0.0:8501:8501"
    depends_on:
      db:
        condition: service_healthy
    # Override for one-off: docker compose run --rm app python run.py ingest
    command: ["python", "run.py", "app", "--port", "8501"]

  api:
    restart: unless-stopped
    build: .
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: space_debris
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "0.0.0.0:8502:8502"
    depends_on:
      db:
        condition: service_healthy
    command: ["python", "run.py", "api", "--port", "8502"]

# 数据库数据持久化在 ./pgdata 目录，删除该目录等同于清空数据库

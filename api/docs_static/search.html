<div id="results"></div>

<script src="/docs/toc.js"></script>
<script>
(function () {
  var PAGES = [
    { url: '/docs', title: '功能总览' },
    { url: '/docs/datasources', title: '数据来源与覆盖' },
    { url: '/docs/modules/overview', title: '系统概览面板' },
    { url: '/docs/modules/visualization', title: '可视化探索' },
    { url: '/docs/modules/catalog', title: '目标目录' },
    { url: '/docs/modules/simulation', title: '轨迹仿真' },
    { url: '/docs/modules/lcola', title: 'LCOLA 飞越筛选' },
    { url: '/docs/modules/collision', title: '碰撞风险评估' },
    { url: '/docs/modules/longterm', title: '长期风险评估' },
    { url: '/docs/modules/ai', title: 'AI 助手' },
    { url: '/docs/api', title: 'API 使用指南' },
    { url: '/docs/api/region', title: 'API · 区域碎片查询' },
    { url: '/docs/api/launch-risk', title: 'API · 发射碰撞风险' },
    { url: '/docs/api/reentry', title: 'API · 再入预报' },
    { url: '/docs/api/tle', title: 'API · TLE 查询' },
    { url: '/docs/api/rcs', title: 'API · RCS 筛选' },
    { url: '/docs/api/stats', title: 'API · 系统统计' }
  ];

  var indexCache = null;
  var input = document.getElementById('searchInput');
  var resultsDiv = document.getElementById('results');
  var titleEl = document.getElementById('search-title');

  var params = new URLSearchParams(location.search);
  var initQ = params.get('q') || '';
  if (initQ) { input.value = initQ; }

  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      var q = input.value.trim();
      if (q) {
        history.replaceState(null, '', '/docs/search?q=' + encodeURIComponent(q));
        doSearch(q);
      }
    }
  });

  function buildIndex() {
    if (indexCache) return Promise.resolve(indexCache);
    var fetches = PAGES.map(function (p) {
      return fetch(p.url).then(function (r) { return r.text(); }).then(function (html) {
        return { page: p, html: html };
      }).catch(function () { return null; });
    });
    return Promise.all(fetches).then(function (results) {
      var idx = [];
      results.forEach(function (r) {
        if (!r) return;
        var parser = new DOMParser();
        var doc = parser.parseFromString(r.html, 'text/html');
        var main = doc.querySelector('.main');
        if (!main) return;

        var sections = [];
        var curHeading = null;
        var curId = '';
        var curText = '';

        var nodes = main.querySelectorAll('h1, h2, h3, p, li, td, code');
        nodes.forEach(function (n) {
          var tag = n.tagName;
          if (tag === 'H1' || tag === 'H2' || tag === 'H3') {
            if (curHeading) {
              sections.push({ heading: curHeading, id: curId, text: curText });
            }
            curHeading = n.textContent.trim();
            curId = n.id || '';
            curText = '';
          } else {
            curText += ' ' + n.textContent.trim();
          }
        });
        if (curHeading) {
          sections.push({ heading: curHeading, id: curId, text: curText });
        }

        sections.forEach(function (s) {
          idx.push({
            pageUrl: r.page.url,
            pageTitle: r.page.title,
            heading: s.heading,
            anchor: s.id,
            text: s.text
          });
        });
      });
      indexCache = idx;
      return idx;
    });
  }

  function doSearch(query) {
    titleEl.textContent = '搜索：' + query;
    resultsDiv.innerHTML = '<p class="search-empty">正在搜索...</p>';

    buildIndex().then(function (idx) {
      var q = query.toLowerCase();
      var matches = [];
      idx.forEach(function (item) {
        var full = (item.heading + ' ' + item.text).toLowerCase();
        var pos = full.indexOf(q);
        if (pos === -1) return;

        var textFull = item.heading + ' ' + item.text;
        var matchStart = pos;
        var snippetStart = Math.max(0, matchStart - 40);
        var snippetEnd = Math.min(textFull.length, matchStart + q.length + 80);
        var raw = textFull.substring(snippetStart, snippetEnd);
        if (snippetStart > 0) raw = '...' + raw;
        if (snippetEnd < textFull.length) raw = raw + '...';

        var escaped = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;');
        var re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        var highlighted = escaped.replace(re, '<mark>$1</mark>');

        matches.push({
          pageTitle: item.pageTitle,
          heading: item.heading,
          url: item.pageUrl + (item.anchor ? '#' + item.anchor : ''),
          snippet: highlighted
        });
      });

      if (matches.length === 0) {
        resultsDiv.innerHTML = '<p class="search-empty">未找到与「' +
          query.replace(/</g, '&lt;') + '」相关的结果</p>';
        return;
      }

      var html = '<p style="color:var(--text-secondary);margin-bottom:20px">找到 ' +
        matches.length + ' 个结果</p>';
      matches.forEach(function (m) {
        html += '<div class="search-result">' +
          '<div class="search-result-page">' + m.pageTitle + '</div>' +
          '<a href="' + m.url + '">' + m.heading.replace(/</g, '&lt;') + '</a>' +
          '<div class="snippet">' + m.snippet + '</div>' +
          '</div>';
      });
      resultsDiv.innerHTML = html;
    });
  }

  if (initQ) doSearch(initQ);
})();
</script>
